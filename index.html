<title>MCAT Study</title>
<script>
  // Apply persisted theme before paint to avoid flash. Theme is a (palette, mode)
  // pair; "system" mode follows the OS. Older single-string themes are migrated.
  (function () {
    function resolve(palette, mode) {
      var dark = mode === 'dark' ||
        (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (palette === 'warm') return dark ? 'darkwarm' : 'warm';
      if (palette === 'duo') return dark ? 'darkgreen' : 'green';
      return dark ? 'dark' : 'light';
    }
    try {
      var raw = JSON.parse(localStorage.getItem('mcat:theme'));
      var palette = 'cold', mode = 'system';
      if (raw && typeof raw === 'object') {
        palette = raw.palette || 'cold';
        mode = raw.mode || 'system';
      } else if (typeof raw === 'string') {
        var map = {
          dark: ['cold', 'dark'], light: ['cold', 'light'], system: ['cold', 'system'],
          warm: ['warm', 'light'], darkwarm: ['warm', 'dark'],
          green: ['duo', 'light'], darkgreen: ['duo', 'dark'],
        };
        var m = map[raw] || ['cold', 'system'];
        palette = m[0]; mode = m[1];
      }
      document.documentElement.setAttribute('data-theme', resolve(palette, mode));
    } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
  })();
</script>
