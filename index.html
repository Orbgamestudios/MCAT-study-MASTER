<title>MCAT Study</title>
<script>
  // Apply persisted theme before paint to avoid flash.
  (function () {
    try {
      const t = JSON.parse(localStorage.getItem('mcat:theme')) || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    } catch { document.documentElement.setAttribute('data-theme', 'dark'); }
  })();
</script>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

<style>
  html, body, #root { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, sans-serif;
    transition: background-color 0.25s ease, color 0.25s ease;
    /* iPhone notch + home indicator */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    -webkit-tap-highlight-color: transparent;
  }
  /* Keep iOS from zooming in on input focus */
  input, textarea, select { font-size: 16px; }
  /* Slightly larger touch targets on mobile */
  @media (max-width: 640px) {
    button { touch-action: manipulation; }
  }
